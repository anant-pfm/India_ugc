name: Update Dashboard Data

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Update index.html from xlsx
        run: |
          XLSX=$(find . -name "*.xlsx" | grep -v ".~lock" | grep -v node_modules | head -1)
          if [ -z "$XLSX" ]; then
            echo "No xlsx found — skipping"
            exit 0
          fi
          echo "Processing: $XLSX"
          python scripts/update_data.py "$XLSX" || echo "Script failed — skipping"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "Auto-update data [skip ci]" && git pull --rebase && git push)
