<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UGC Production Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f2f1ed;--sf:#fff;--sf2:#f7f6f3;--bd:#e5e3db;--bds:#ccc9be;--tx:#18170f;--t2:#57554c;--t3:#9b9890;--blue:#1a56db;--blue-l:#eff4ff;--blue-b:#b4c8fd;--blue-t:#1e3a8a;--green:#047857;--green-l:#ecfdf5;--green-b:#6ee7b7;--green-t:#064e3b;--amber:#b45309;--amber-l:#fffbeb;--amber-b:#fcd34d;--amber-t:#78350f;--red:#dc2626;--red-t:#991b1b;--purple:#6d28d9;--purple-l:#f5f3ff;--purple-b:#c4b5fd;--purple-t:#4c1d95;--slate:#475569;--slate-l:#f1f5f9;--slate-t:#1e293b;--indigo:#4338ca;--indigo-l:#eef2ff;--indigo-t:#312e81;--teal:#0e7490;--teal-l:#ecfeff;--teal-t:#164e63}
[data-theme="dark"]{
  --bg:#0f0f0e;
  --sf:#1a1a18;
  --sf2:#212120;
  --bd:#2e2e2b;
  --bds:#3d3d39;
  --tx:#e8e5e0;
  --t2:#9a9690;
  --t3:#5a5750;
  --blue:#4a7cdc;
  --blue-l:#1a2236;
  --blue-b:#2a3d6a;
  --blue-t:#7eb3ff;
  --green:#10b981;
  --green-l:#0d2018;
  --green-b:#1a4030;
  --green-t:#34d399;
  --amber:#f59e0b;
  --amber-l:#241a08;
  --amber-b:#4a3208;
  --amber-t:#fbbf24;
  --red:#f87171;
  --red-t:#fca5a5;
  --purple:#8b5cf6;
  --purple-l:#1c1530;
  --purple-b:#3d2870;
  --purple-t:#a78bfa;
  --slate:#64748b;
  --slate-l:#18202e;
  --slate-t:#94a3b8;
  --indigo:#6366f1;
  --indigo-l:#1a1a30;
  --indigo-t:#818cf8;
  --teal:#0891b2;
  --teal-l:#0a2028;
  --teal-t:#22d3ee;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}
.topbar{background:var(--tx);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300}
[data-theme="dark"] .topbar{background:#0a0a09}
.tb-l{display:flex;align-items:center;gap:8px}
.tb-logo{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center}
.tb-logo svg{width:13px;height:13px}
.tb-title{font-size:13px;font-weight:600;color:#fff}
.tb-tag{font-size:10px;color:rgba(255,255,255,.45);padding:2px 7px;border-radius:20px;border:1px solid rgba(255,255,255,.15)}
.tb-r{display:flex;align-items:center;gap:8px}
.zoom-sel{padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.75);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;outline:none}
.tab-nav{background:var(--tx);padding:0 20px;display:flex;border-bottom:1px solid rgba(255,255,255,.1)}
[data-theme="dark"] .tab-nav{background:#0a0a09;border-bottom-color:rgba(255,255,255,.08)}
.tab-btn{padding:9px 16px;font-size:12px;font-weight:500;color:rgba(255,255,255,.45);background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent}
.tab-btn.active{color:#fff;border-bottom-color:#fff}
.main{padding:18px 20px 60px;max-width:100%;margin:0 auto}
.tab-panel{display:none}.tab-panel.active{display:block}
.toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.tbl-l{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--bds);background:var(--sf);color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif}
.pill:hover{border-color:var(--blue);color:var(--blue)}
.pill.active{background:var(--tx);border-color:var(--tx);color:#fff}
.toggle-wrap{display:flex;align-items:center;gap:6px;padding:4px 11px;border-radius:8px;border:1px solid var(--bds);background:var(--sf);cursor:pointer;user-select:none;font-size:12px;font-weight:500;color:var(--t2)}
.toggle-wrap.on{background:var(--purple-l);border-color:var(--purple-b);color:var(--purple-t)}
.toggle-sw{width:26px;height:14px;border-radius:7px;background:var(--bds);position:relative;flex-shrink:0}
.toggle-sw::after{content:'';position:absolute;width:10px;height:10px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.toggle-wrap.on .toggle-sw{background:var(--purple)}
.toggle-wrap.on .toggle-sw::after{transform:translateX(12px)}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;border:1px solid var(--bds);background:var(--sf);color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-sm svg{width:13px;height:13px}
.grp-bar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:10px;padding:7px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:10px}
.grp-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.grp-btn{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:500;border:1px solid var(--bds);background:var(--sf2);color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px}
.grp-btn.on{color:#fff}
.grp-btn.on.g-ij{background:var(--slate);border-color:var(--slate)}
.grp-btn.on.g-km{background:var(--indigo);border-color:var(--indigo)}
.grp-btn.on.g-sc{background:var(--blue);border-color:var(--blue)}
.grp-btn.on.g-er{background:var(--green);border-color:var(--green)}
.grp-btn.on.g-pr{background:var(--amber);border-color:var(--amber)}
.grp-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.frow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.swrap{position:relative}
.swrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--t3);pointer-events:none}
.sinput{padding:5px 10px 5px 28px;border-radius:7px;border:1px solid var(--bds);background:var(--sf);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--tx);outline:none;width:185px}
.ssel{padding:5px 9px;border-radius:7px;border:1px solid var(--bds);background:var(--sf);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--t2);outline:none;cursor:pointer}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:8px;margin-bottom:14px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.si{width:24px;height:24px;border-radius:6px;background:var(--sf2);display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.si svg{width:12px;height:12px;color:var(--t2)}
.sl{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.sv{font-size:21px;font-weight:600;letter-spacing:-.5px;line-height:1.1}
.sv.c-blue{color:var(--blue)}.sv.c-green{color:var(--green)}.sv.c-amber{color:var(--amber)}
.tbl-card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
thead tr.sr th{padding:6px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--bd);text-align:center}
.th-base{background:var(--sf2);color:var(--t3);text-align:left}
.th-ij{background:var(--slate-l);color:var(--slate-t);border-left:3px solid var(--slate)}
.th-km{background:var(--indigo-l);color:var(--indigo-t);border-left:3px solid var(--indigo)}
.th-sc{background:var(--blue-l);color:var(--blue-t);border-left:3px solid var(--blue)}
.th-er{background:var(--green-l);color:var(--green-t);border-left:3px solid var(--green)}
.th-pr{background:var(--amber-l);color:var(--amber-t);border-left:3px solid var(--amber)}
thead tr.cr th{padding:7px 8px;font-size:10px;font-weight:600;color:var(--t3);text-align:center;border-bottom:1px solid var(--bd);white-space:nowrap;background:var(--sf)}
thead tr.cr th.left{text-align:left}
.ch-ij{background:#f5f7fa;border-left:3px solid var(--slate)}.ch-ijc{background:#f5f7fa}
.ch-km{background:#f0f0fb;border-left:3px solid var(--indigo)}.ch-kmc{background:#f0f0fb}
.ch-sc{background:#dbe8ff;border-left:3px solid var(--blue)}.ch-scc{background:#f7f9ff}
.ch-er{background:#d4f5e6;border-left:3px solid var(--green)}.ch-erc{background:#f5fdf9}
.ch-pr{background:#fef0cc;border-left:3px solid var(--amber)}.ch-prc{background:#fdfcf5}
.ch-ps{background:#edf0fb;border-left:2px dashed var(--blue);color:var(--purple-t);font-style:italic}
.ch-pe{background:#eaf4ee;border-left:2px dashed var(--green);color:var(--purple-t);font-style:italic}
.ch-pp{background:#f5efe0;border-left:2px dashed var(--amber);color:var(--purple-t);font-style:italic}
.ei{color:var(--blue);font-size:9px;margin-left:2px}
tbody tr{border-bottom:1px solid var(--bd)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover td{background:var(--sf2)!important}
td{padding:8px;vertical-align:middle;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.left{text-align:left}
.td-ij{background:#f5f7fa;border-left:3px solid var(--slate)}.td-ijc{background:#f5f7fa}
.td-km{background:#f0f0fb;border-left:3px solid var(--indigo)}.td-kmc{background:#f0f0fb}
.td-sc{background:#f7f9ff;border-left:3px solid var(--blue)}.td-scc{background:#f7f9ff}
.td-er{background:#f5fdf9;border-left:3px solid var(--green)}.td-erc{background:#f5fdf9}
.td-pr{background:#fdfcf5;border-left:3px solid var(--amber)}.td-prc{background:#fdfcf5}
.td-ps{background:#edf0fb;border-left:2px dashed var(--blue)}
.td-pe{background:#eaf4ee;border-left:2px dashed var(--green)}
.td-pp{background:#f5efe0;border-left:2px dashed var(--amber)}
.sn{font-weight:500;display:block;max-width:165px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}
.dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.b-run{background:var(--green-l);color:var(--green-t);border:1px solid var(--green-b)}.b-run .dot{background:var(--green)}
.b-pau{background:var(--amber-l);color:var(--amber-t);border:1px solid var(--amber-b)}.b-pau .dot{background:var(--amber)}
.b-tbp{background:var(--purple-l);color:var(--purple-t);border:1px solid var(--purple-b)}.b-tbp .dot{background:var(--purple)}
.mu{color:var(--t3)}
.mn{font-family:'DM Mono',monospace;font-size:11px}
.mnb{font-weight:600;font-family:'DM Mono',monospace;font-size:11px}
.pv{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple-t);font-style:italic}
.ec{display:flex;align-items:center;justify-content:center;gap:3px}
.ei2{width:54px;padding:2px 4px;border-radius:5px;font-size:11px;font-family:'DM Mono',monospace;border:1px solid var(--bds);background:transparent;color:var(--tx);text-align:center;outline:none}
.ei2:focus,.ei2.dirty{border-color:var(--blue);background:var(--blue-l)}
.sb{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;border:none;background:var(--blue);color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif}
.tfoot{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid var(--bd);background:var(--sf2);flex-wrap:wrap;gap:5px}
.tft{font-size:10px;color:var(--t3)}
kbd{background:var(--bg);border:1px solid var(--bds);border-radius:3px;padding:1px 4px;font-family:'DM Mono',monospace;font-size:9px}
.ystats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.ytcard{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
table.ytbl{min-width:750px}
table.ytbl thead th{padding:8px 10px;font-size:10px;font-weight:600;color:var(--t3);background:var(--sf2);border-bottom:1px solid var(--bd);white-space:nowrap;text-align:center;cursor:pointer;user-select:none}
table.ytbl thead th.left{text-align:left;cursor:default}
.yh-sc{background:#dbe8ff;color:var(--blue-t)}.yh-er{background:#d4f5e6;color:var(--green-t)}
.yh-lv{background:#fef0cc;color:var(--amber-t)}.yh-wc{background:#ede8ff;color:var(--purple-t)}
.yh-dr{background:#ccf5fa;color:var(--teal-t)}
table.ytbl tbody tr{border-bottom:1px solid var(--bd)}
table.ytbl tbody tr:last-child{border-bottom:none}
table.ytbl tbody tr:hover td{background:var(--sf2)!important}
table.ytbl td{padding:8px 10px;text-align:center;white-space:nowrap}
table.ytbl td.left{text-align:left}
.yt-ttl{font-weight:500;max-width:200px;display:block;overflow:hidden;text-overflow:ellipsis}
.yt-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3)}
.yn{font-family:'DM Mono',monospace;font-size:11px;font-weight:500}
.y-bar{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.y-left{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.y-mpills{display:flex;flex-direction:column;gap:2px}
.yp{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--bds);background:var(--sf);color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif}
.yp:hover{border-color:var(--blue)}
.yp.single{background:var(--tx);border-color:var(--tx);color:#fff}
.yp.cmpa{background:var(--blue);border-color:var(--blue);color:#fff}
.yp.cmpb{background:var(--purple);border-color:var(--purple);color:#fff}
.ycbar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--purple-l);border:1px solid var(--purple-b);border-radius:8px;margin-bottom:12px;font-size:12px;color:var(--purple-t);flex-wrap:wrap}
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;background:var(--tx);color:var(--bg);opacity:0;transition:opacity .2s;pointer-events:none}
#toast.show{opacity:1}
/* ── Dark mode overrides ── */
/* Table row cells */
[data-theme="dark"] tbody tr:hover td{background:#252523!important}
[data-theme="dark"] .td-ij{background:#1d2130;border-left-color:#64748b}
[data-theme="dark"] .td-ijc{background:#1d2130}
[data-theme="dark"] .td-km{background:#1d1d2e;border-left-color:#6366f1}
[data-theme="dark"] .td-kmc{background:#1d1d2e}
[data-theme="dark"] .td-sc{background:#1a2035;border-left-color:#4a7cdc}
[data-theme="dark"] .td-scc{background:#1a2035}
[data-theme="dark"] .td-er{background:#0f1f18;border-left-color:#10b981}
[data-theme="dark"] .td-erc{background:#0f1f18}
[data-theme="dark"] .td-pr{background:#231a0a;border-left-color:#f59e0b}
[data-theme="dark"] .td-prc{background:#231a0a}
[data-theme="dark"] .td-ps{background:#1d2135;border-left-color:#8b5cf6}
[data-theme="dark"] .td-pe{background:#0f1f18;border-left-color:#10b981}
[data-theme="dark"] .td-pp{background:#231a0a;border-left-color:#f59e0b}
/* Column headers */
[data-theme="dark"] thead tr.cr th{background:#1a1a18;color:var(--t3)}
[data-theme="dark"] .ch-ij{background:#202535;border-left-color:#64748b}
[data-theme="dark"] .ch-ijc{background:#1d2130}
[data-theme="dark"] .ch-km{background:#201f30;border-left-color:#6366f1}
[data-theme="dark"] .ch-kmc{background:#1d1d2e}
[data-theme="dark"] .ch-sc{background:#1e2a42;border-left-color:#4a7cdc}
[data-theme="dark"] .ch-scc{background:#1a2035}
[data-theme="dark"] .ch-er{background:#112518;border-left-color:#10b981}
[data-theme="dark"] .ch-erc{background:#0f1f18}
[data-theme="dark"] .ch-pr{background:#2a1e0a;border-left-color:#f59e0b}
[data-theme="dark"] .ch-prc{background:#231a0a}
[data-theme="dark"] .ch-ps{background:#1d2135;color:#a78bfa}
[data-theme="dark"] .ch-pe{background:#0f1f18;color:#34d399}
[data-theme="dark"] .ch-pp{background:#231a0a;color:#fbbf24}
/* Section headers */
[data-theme="dark"] .th-base{background:#212120;color:var(--t3)}
[data-theme="dark"] .th-ij{background:#1d2130;color:#94a3b8;border-left-color:#64748b}
[data-theme="dark"] .th-km{background:#1d1d2e;color:#818cf8;border-left-color:#6366f1}
[data-theme="dark"] .th-sc{background:#1a2035;color:#7eb3ff;border-left-color:#4a7cdc}
[data-theme="dark"] .th-er{background:#0f1f18;color:#34d399;border-left-color:#10b981}
[data-theme="dark"] .th-pr{background:#231a0a;color:#fbbf24;border-left-color:#f59e0b}
/* Yearly table headers */
[data-theme="dark"] table.ytbl thead th{background:#212120;color:var(--t3)}
[data-theme="dark"] .yh-sc{background:#1e2a42;color:#7eb3ff}
[data-theme="dark"] .yh-er{background:#112518;color:#34d399}
[data-theme="dark"] .yh-lv{background:#2a1e0a;color:#fbbf24}
[data-theme="dark"] .yh-wc{background:#1c1538;color:#a78bfa}
[data-theme="dark"] .yh-dr{background:#0a2230;color:#22d3ee}
/* Yearly body cells */
[data-theme="dark"] .yn{color:var(--tx)}
/* Stat cards */
[data-theme="dark"] .sc{background:var(--sf);border-color:var(--bd)}
[data-theme="dark"] .si{background:var(--sf2)}
/* Table card */
[data-theme="dark"] .tbl-card,[data-theme="dark"] .ytcard{background:var(--sf);border-color:var(--bd)}
[data-theme="dark"] .tfoot{background:var(--sf2);border-color:var(--bd)}
/* Inputs */
[data-theme="dark"] .ei2{background:transparent;border-color:var(--bds);color:var(--tx)}
[data-theme="dark"] .ei2:focus,[data-theme="dark"] .ei2.dirty{background:var(--blue-l);border-color:var(--blue)}
/* Filters */
[data-theme="dark"] .sinput,[data-theme="dark"] .ssel{background:var(--sf);border-color:var(--bds);color:var(--tx)}
[data-theme="dark"] .grp-bar{background:var(--sf);border-color:var(--bd)}
/* Compare diff column */
[data-theme="dark"] td[style*="background:#fafaf8"]{background:#212120!important}
[data-theme="dark"] th[style*="background:#fafaf8"]{background:#252523!important}
/* Badges */
[data-theme="dark"] .b-run{background:#0d2018;border-color:#1a4030;color:#34d399}
[data-theme="dark"] .b-pau{background:#241a08;border-color:#4a3208;color:#fbbf24}
[data-theme="dark"] .b-tbp{background:#1c1530;border-color:#3d2870;color:#a78bfa}
/* Compare bar */
[data-theme="dark"] .ycbar{background:#1c1530;border-color:#3d2870;color:#a78bfa}
/* Yearly compare cell backgrounds */
[data-theme="dark"] td[style*="#f7f9ff"]{background:#1a2035!important}
[data-theme="dark"] td[style*="#f5fdf9"]{background:#0f1f18!important}
[data-theme="dark"] td[style*="#fdfcf5"]{background:#231a0a!important}
[data-theme="dark"] td[style*="#f8f6ff"]{background:#1c1538!important}
[data-theme="dark"] td[style*="#f0fdff"]{background:#0a2230!important}

/* ── Daily Tracker ── */
.d-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.d-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.d-month-pills{display:flex;gap:4px;flex-wrap:wrap}
.d-day-pills{display:flex;gap:4px;flex-wrap:wrap}
.dpill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--bds);background:var(--sf);color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif}
.dpill:hover{border-color:var(--blue)}
.dpill.active{background:var(--tx);border-color:var(--tx);color:#fff}
.d-date-input{padding:4px 8px;border-radius:7px;border:1px solid var(--bds);background:var(--sf);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--tx);outline:none;cursor:pointer}
.d-date-input:focus{border-color:var(--blue)}
[data-theme="dark"] .d-date-input{background:var(--sf);border-color:var(--bds);color:var(--tx);color-scheme:dark}
.d-section-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.d-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
table.dtbl{min-width:900px}
table.dtbl thead th{padding:8px 10px;font-size:10px;font-weight:600;color:var(--t3);background:var(--sf2);border-bottom:1px solid var(--bd);white-space:nowrap;text-align:center}
table.dtbl thead th.left{text-align:left}
.dh-date{background:#f5f7fa;color:var(--slate-t)}
.dh-show{background:var(--sf2);color:var(--t3)}
.dh-sc{background:#dbe8ff;color:var(--blue-t)}.dh-er{background:#d4f5e6;color:var(--green-t)}
.dh-lv{background:#fef0cc;color:var(--amber-t)}.dh-wc{background:#ede8ff;color:var(--purple-t)}
.dh-dur{background:#ccf5fa;color:var(--teal-t)}
table.dtbl tbody tr{border-bottom:1px solid var(--bd)}
table.dtbl tbody tr:last-child{border-bottom:none}
table.dtbl tbody tr:hover td{background:var(--sf2)!important}
table.dtbl td{padding:8px 10px;text-align:center;white-space:nowrap}
table.dtbl td.left{text-align:left}
.d-date{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--tx)}
.d-day{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--sf2);color:var(--t2)}
.d-day.weekend{background:var(--amber-l);color:var(--amber-t)}
.d-show{font-weight:500;max-width:200px;display:block;overflow:hidden;text-overflow:ellipsis}
.d-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3)}
.dn{font-family:'DM Mono',monospace;font-size:11px;font-weight:500}
/* dark mode */
[data-theme="dark"] table.dtbl thead th{background:var(--sf2);color:var(--t3)}
[data-theme="dark"] .dh-date{background:#1d2130}
[data-theme="dark"] .dh-sc{background:#1a2035;color:#7eb3ff}
[data-theme="dark"] .dh-er{background:#0f1f18;color:#34d399}
[data-theme="dark"] .dh-lv{background:#231a0a;color:#fbbf24}
[data-theme="dark"] .dh-wc{background:#1c1538;color:#a78bfa}
[data-theme="dark"] .dh-dur{background:#0a2230;color:#22d3ee}
[data-theme="dark"] .d-day{background:var(--sf2);color:var(--t2)}
[data-theme="dark"] .d-day.weekend{background:#231a0a;color:#fbbf24}
/* Toggle switch */
.theme-toggle{display:flex;align-items:center;gap:6px}
.theme-toggle svg{width:14px;height:14px;color:rgba(255,255,255,.6)}
.theme-toggle svg.active{color:#fff}
.tswitch{width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.25);position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.tswitch.dark{background:rgba(99,102,241,.6);border-color:rgba(99,102,241,.8)}
.tswitch-thumb{position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tswitch.dark .tswitch-thumb{transform:translateX(16px)}
</style>
</head>
<body>

  <div class="tb-l">
    <div class="tb-logo"><svg viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="white"/><rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity=".6"/><rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity=".6"/><rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity=".3"/></svg></div>
    <span class="tb-title">UGC Production Tracker</span>
    <span class="tb-tag" id="wtag"></span>
  </div>
  <div class="tb-r">
    <div class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
      <svg id="sun-icon" class="active" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <div class="tswitch" id="tswitch"><div class="tswitch-thumb"></div></div>
      <svg id="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </div>
    <select class="zoom-sel" onchange="applyZoom(this.value)">
      <option value="1">100%</option><option value="0.9">90%</option><option value="0.8">80%</option><option value="0.75">75%</option><option value="0.6">60%</option><option value="0.5">50%</option>
    </select>
  </div>
</header>
<nav class="tab-nav">

  <button class="tab-btn" data-tab="yearly">Yearly Tracker</button>

<main class="main">

<div class="tab-panel active" id="tab-weekly">
  <div class="toolbar">
    <div class="tbl-l">
      <div class="filter-pills" id="wpills"></div>
      <div class="toggle-wrap" id="prev-tog" onclick="togglePrev()"><div class="toggle-sw"></div><span>Last week targets</span></div>
    </div>

      <button class="btn-sm" onclick="exportCSV()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export CSV</button>
    </div>

  <div class="grp-bar">

    <button class="grp-btn g-sc on" id="grp-sc" onclick="toggleGrp('sc')"><span class="grp-dot"></span>Scripting</button>
    <button class="grp-btn g-er on" id="grp-er" onclick="toggleGrp('er')"><span class="grp-dot"></span>ER Review</button>

    <div class="swrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="sinput" id="wsearch" type="text" placeholder="Search show name..." oninput="rWeekly()"></div>
    <select class="ssel" id="fstatus" onchange="rWeekly()"><option value="">All statuses</option><option value="Running">Running</option><option value="Paused">Paused</option><option value="To Be Picked">To Be Picked</option></select>

  <div class="stats-grid" id="wstats"></div>
  <div class="tbl-card"><div class="tbl-scroll"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
    <div class="tfoot"><span class="tft" id="wcount"></span><span class="tft">Editable targets: type &amp; <kbd>Enter</kbd> or Save &nbsp;&#183;&nbsp; <span style="color:var(--purple-t);font-style:italic">italic</span> = prev week</span></div>
  </div>
</div>

<div class="tab-panel" id="tab-yearly">
  <div class="y-bar">
    <div class="y-left">
      <div>
        <div class="swrap" style="margin-bottom:6px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="sinput" id="ysearch" style="width:210px" type="text" placeholder="Search show name or ID..." oninput="rYearly()"></div>
        <div style="font-size:10px;color:var(--t3)" id="yhint">Click a month to filter · Click 2 to compare</div>
      </div>
      <div>
        <div style="font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Month</div>
        <div class="y-mpills" id="ypills"></div>
      </div>
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Week</div>
        <div style="display:flex;gap:4px">
          <button class="yp" id="ywk-all" onclick="setYWk('all')">All</button>
          <button class="yp" id="ywk-w1" onclick="setYWk('W1')">W1</button>
          <button class="yp" id="ywk-w2" onclick="setYWk('W2')">W2</button>
          <button class="yp" id="ywk-w3" onclick="setYWk('W3')">W3</button>
          <button class="yp" id="ywk-w4" onclick="setYWk('W4')">W4</button>
          <button class="yp" id="ywk-sum" onclick="setYWk('sum')" style="margin-left:6px;border-style:dashed" title="Aggregate all weeks into monthly totals">&#931; Monthly</button>
        </div>
      </div>
    </div>
    <button class="btn-sm" onclick="exportYCSV()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export CSV</button>
  </div>
  <div id="ycbar" style="display:none" class="ycbar"><span id="yclbl"></span><button onclick="clearCmp()" style="padding:2px 8px;border-radius:4px;border:1px solid var(--purple-b);background:transparent;color:var(--purple-t);cursor:pointer;font-size:11px;margin-left:auto">&#10005; Clear</button></div>
  <div class="ystats" id="ystats"></div>
  <div class="ytcard"><div class="tbl-scroll"><table class="ytbl"><thead id="ythead"></thead><tbody id="ytbody"></tbody></table></div>
    <div class="tfoot"><span class="tft" id="ycount"></span></div>
  </div>
</div>
<div class="tab-panel" id="tab-daily">
  <div class="d-bar">
    <div class="d-left">
      <div class="swrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="sinput" id="dsearch" style="width:200px" type="text" placeholder="Search show name or ID..." oninput="rDaily()"></div>
      <div style="display:flex;align-items:center;gap:8px">
        <div>
          <div class="d-section-lbl" style="margin-bottom:4px">Year</div>
          <select class="ssel" id="d-year" onchange="onDYearChange()">
            <option value="">All years</option>
          </select>

<script>
// AUTH GUARD


// ── DATA ──────────────────────────────────────────────────────────────────────
// ── DATA ─────────────────────────────────────────────────────────────────────
// WDATA: Monthwise sheet  — 22 fields/row
// 0:prod_id  1:wk  2:show  3:status  4:pod  5:writer  6:producer
// 7:scripts  8:dur  9:ttd_sc  10:ttd_er  11:ttd_rel
// 12:jt  13:sub  14:wc  15:sc_missed  16:nt  17:er  18:er_pend  19:qt  20:live  21:wkdate
//
// YDATA: Weekly Dump sheet — 11 fields/row
// 0:show_id  1:show  2:month  3:msort  4:sub  5:er  6:live  7:wc  8:dur  9:week  10:wdate
//
// DDATA: Daily Dump sheet  — 9 fields/row
// 0:date  1:day  2:id  3:show  4:sub  5:er  6:live  7:wc  8:dur

// Mutable arrays — filled by loadData() before dashboard renders
const WDATA=[];
const YDATA=[];
const DDATA=[];
// ── FIELD INDEX MAPS ─────────────────────────────────────────────────────────
const F={
  prod_id:0, wk:1, show:2, status:3, pod:4, writer:5, producer:6,
  i_sc:7, j_dur:8, k_ttd_sc:9, l_ttd_er:10, m_ttd_rel:11,
  jt:12, sub:13, wc:14, sc_pend:15, nt:16, er:17, pend:18, qt:19, live:20, wkdate:21
};
const YF={id:0, show:1, month:2, msort:3, sub:4, er:5, live:6, wc:7, dur:8, week:9, wdate:10};
const DF={date:0, day:1, id:2, show:3, sub:4, er:5, live:6, wc:7, dur:8};


// ── ROWS (rebuilt in startDashboard after data loads) ────────────────────────
let rows=[];
function buildRows(){
  rows.length=0;
  WDATA.forEach((r,i)=>rows.push({
    _id:i,
    _key:(r[F.prod_id]||r[F.show]||'x')+'__'+r[F.wk],
    _d:[...r],
    jt:r[F.jt],
    nt:r[F.nt],
    qt:r[F.qt]
  }));
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let fWk=null, showPrev=false;
const dirty={};
const STORE='ugc_v8';
const GRP={ij:true,km:true,sc:true,er:true,pr:true};
let yFM='all', yCmp=[], ySort='', yWkFilt='all';

// ── TARGETS: Excel is source of truth ────────────────────────────────────────
// Upload new Excel → targets update automatically.
// Edit in dashboard → saves to localStorage as override.
// Override only persists until you update Excel with final numbers.
function loadT(){
  try{
    const s=JSON.parse(localStorage.getItem(STORE)||'{}');
    rows.forEach(r=>{
      if(s[r._key+'j']!==undefined) r.jt=s[r._key+'j'];
      if(s[r._key+'n']!==undefined) r.nt=s[r._key+'n'];
      if(s[r._key+'q']!==undefined) r.qt=s[r._key+'q'];
    });
  }catch(e){}
}
function saveT(){
  const s={};
  rows.forEach(r=>{
    if(r.jt!==r._d[F.jt]) s[r._key+'j']=r.jt;
    if(r.nt!==r._d[F.nt]) s[r._key+'n']=r.nt;
    if(r.qt!==r._d[F.qt]) s[r._key+'q']=r.qt;
  });
  localStorage.setItem(STORE,JSON.stringify(s));
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function nv(v){const x=parseFloat(v);return isNaN(x)?null:x;}
function fmt(v){return(v===''||v==null)?'<span class="mu">&#8212;</span>':v;}
function fN(v){
  if(v===''||v==null) return'<span class="mu">&#8212;</span>';
  const x=parseFloat(v);
  if(isNaN(x)||x===0) return'<span class="mu">&#8212;</span>';
  return x%1===0?Math.round(x).toLocaleString('en-IN'):x.toFixed(2);
}
function fWC(v){const x=parseInt(v);return(!x||x===0)?'<span class="mu">&#8212;</span>':x.toLocaleString('en-IN');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function today(){return new Date().toISOString().slice(0,10);}
function applyZoom(v){document.body.style.zoom=parseFloat(v);try{localStorage.setItem('ugc_zoom',v);}catch(e){}}
let toastT;
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.className='show';clearTimeout(toastT);toastT=setTimeout(()=>e.className='',2500);}

// ── WEEK HELPERS ──────────────────────────────────────────────────────────────
function uWks(){return[...new Set(rows.map(r=>r._d[F.wk]).filter(Boolean))];}
function sortWks(){
  return uWks().sort((a,b)=>{
    const ra=rows.find(r=>r._d[F.wk]===a);
    const rb=rows.find(r=>r._d[F.wk]===b);
    return((ra&&ra._d[F.wkdate])||'').localeCompare((rb&&rb._d[F.wkdate])||'');
  });
}
function prevWk(){const w=sortWks(),i=w.indexOf(fWk);return i>0?w[i-1]:null;}
function filtered(){
  const q=(document.getElementById('wsearch')||{value:''}).value.toLowerCase();
  const st=(document.getElementById('fstatus')||{value:''}).value;
  const pod=(document.getElementById('fpod')||{value:''}).value;
  const wr=(document.getElementById('fwriter')||{value:''}).value;
  return rows.filter(r=>{
    if(r._d[F.wk]!==fWk)return false;
    if(q&&!r._d[F.show].toLowerCase().includes(q))return false;
    if(st&&r._d[F.status]!==st)return false;
    if(pod&&r._d[F.pod]!==pod)return false;
    if(wr&&r._d[F.writer]!==wr)return false;
    return true;
  });
}
function pRow(show){const pw=prevWk();if(!pw)return null;return rows.find(r=>r._d[F.wk]===pw&&r._d[F.show]===show)||null;}
function gT(row,f){const k=row._key+f;return dirty[k]!==undefined?dirty[k]:row[f];}

// ── COLUMN GROUPS ─────────────────────────────────────────────────────────────
function toggleGrp(g){GRP[g]=!GRP[g];document.getElementById('grp-'+g).classList.toggle('on',GRP[g]);rHead();rBody();}

// ── DROPDOWNS ─────────────────────────────────────────────────────────────────
function popDDs(){
  const wr=rows.filter(r=>r._d[F.wk]===fWk);
  const podEl=document.getElementById('fpod'),wrEl=document.getElementById('fwriter');
  const cp=podEl.value,cw=wrEl.value;
  const pods=[...new Set(wr.map(r=>r._d[F.pod]).filter(Boolean))].sort();
  const writers=[...new Set(wr.map(r=>r._d[F.writer]).filter(Boolean))].sort();
  podEl.innerHTML='<option value="">All POD leads</option>'+pods.map(p=>`<option value="${esc(p)}"${cp===p?' selected':''}>${esc(p)}</option>`).join('');
  wrEl.innerHTML='<option value="">All writers</option>'+writers.map(w=>`<option value="${esc(w)}"${cw===w?' selected':''}>${esc(w)}</option>`).join('');
}

// ── WEEK FILTER PILLS ─────────────────────────────────────────────────────────
function rFilters(){
  const wks=sortWks();
  const el=document.getElementById('wpills');
  el.innerHTML=wks.map(w=>`<button class="pill${fWk===w?' active':''}" data-w="${esc(w)}">${esc(w)}</button>`).join('');
  el.querySelectorAll('.pill').forEach(b=>b.addEventListener('click',()=>setWk(b.dataset.w)));
  document.getElementById('wtag').textContent=fWk||'';
  const hp=prevWk()!==null;
  const tog=document.getElementById('prev-tog');
  tog.style.opacity=hp?'1':'0.4';
  tog.style.pointerEvents=hp?'auto':'none';
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function rStats(){
  const list=filtered();
  const run=list.filter(r=>r._d[F.status]==='Running').length;
  const pau=list.filter(r=>r._d[F.status]==='Paused').length;
  const sub=list.reduce((s,r)=>s+(nv(r._d[F.sub])||0),0);
  const er=list.reduce((s,r)=>s+(nv(r._d[F.er])||0),0);
  const lv=list.reduce((s,r)=>s+(nv(r._d[F.live])||0),0);
  const isc=list.reduce((s,r)=>s+(nv(r._d[F.i_sc])||0),0);
  const items=[
    {l:'Shows',v:list.length,i:iG,c:''},
    {l:'Running',v:run,i:iPl,c:'c-green'},
    {l:'Paused',v:pau,i:iPa,c:'c-amber'},
    {l:'Scripts submitted',v:sub.toLocaleString('en-IN'),i:iF,c:'c-blue'},
    {l:'ER approved',v:er,i:iCk,c:'c-green'},

function mDirty(el){
  const k=el.dataset.k, f=el.dataset.f;
  dirty[k+f]=el.value;
  el.classList.add('dirty');
  let btn=el.nextElementSibling;
  if(!btn||btn.tagName!=='BUTTON'){
    btn=document.createElement('button');
    btn.className='sb';btn.textContent='Save';
    btn.dataset.k=k;btn.dataset.f=f;
    btn.addEventListener('click',function(){comT(this.dataset.k,this.dataset.f);});
    el.parentNode.appendChild(btn);
  }
}
function kChk(e,el){if(e.key==='Enter')comT(el.dataset.k,el.dataset.f);}
function comT(k,f){
  const key=k+f, val=dirty[key];
  if(val===undefined)return;
  const row=rows.find(r=>r._key===k);
  if(row){const fm={j:'jt',n:'nt',q:'qt'};row[fm[f]]=val;delete dirty[key];}
  saveT();rHead();rBody();toast('Target saved');
}

// ── YEARLY ────────────────────────────────────────────────────────────────────
function yMonths(){
  return[...new Set(YDATA.map(r=>r[YF.month]))].sort((a,b)=>{
    const sa=YDATA.find(r=>r[YF.month]===a)?.[YF.msort]||'';
    const sb=YDATA.find(r=>r[YF.month]===b)?.[YF.msort]||'';
    return sa.localeCompare(sb);
  });
}
function yFilt(){
  const q=(document.getElementById('ysearch')||{value:''}).value.toLowerCase().trim();
  let months=null;
  if(yCmp.length>=1) months=yCmp;
  else if(yFM!=='all') months=[yFM];

  let list=YDATA.filter(r=>{
    if(months&&!months.includes(r[YF.month]))return false;
    if(q&&!r[YF.show].toLowerCase().includes(q)&&!r[YF.id].toLowerCase().includes(q))return false;
    if(yWkFilt&&yWkFilt!=='all'&&yWkFilt!=='sum'&&r[YF.week]!==yWkFilt)return false;
    return true;
  });

  // "All" weeks selected → aggregate all weeks into one row per show+month
  if(yWkFilt==='sum'){
    const agg={};
    list.forEach(r=>{
      const key=r[YF.id]+'||'+r[YF.month];
      if(!agg[key]){
        agg[key]=[...r];
        agg[key][YF.week]='';
      } else {
        agg[key][YF.sub] = Math.round((agg[key][YF.sub]||0) + (r[YF.sub]||0));
        agg[key][YF.er]  = Math.round((agg[key][YF.er]||0)  + (r[YF.er]||0));
        agg[key][YF.live]= Math.round((agg[key][YF.live]||0) + (r[YF.live]||0));
        agg[key][YF.wc]  = Math.round((agg[key][YF.wc]||0)  + (r[YF.wc]||0));
        agg[key][YF.dur] = Math.round(((agg[key][YF.dur]||0) + (r[YF.dur]||0))*100)/100;
      }
    });
    list=Object.values(agg);
  }

  // Sort
  if(ySort==='week') list.sort((a,b)=>(a[YF.wdate]||'').localeCompare(b[YF.wdate]||''));
  else if(ySort==='sub')  list.sort((a,b)=>b[YF.sub]-a[YF.sub]);
  else if(ySort==='er')   list.sort((a,b)=>b[YF.er]-a[YF.er]);
  else if(ySort==='live') list.sort((a,b)=>b[YF.live]-a[YF.live]);
  else if(ySort==='wc')   list.sort((a,b)=>b[YF.wc]-a[YF.wc]);
  else if(ySort==='dur')  list.sort((a,b)=>b[YF.dur]-a[YF.dur]);
  else list.sort((a,b)=>a[YF.show].localeCompare(b[YF.show]));
  return list;
}
function setYWk(w){
  yWkFilt=w;
  ['all','w1','w2','w3','w4','sum'].forEach(k=>{
    const el=document.getElementById('ywk-'+k);
    if(el) el.classList.toggle('single', k===w.toLowerCase() || (k==='all'&&w==='all'));
  });

function rYPills(){
  const months=yMonths();
  const el=document.getElementById('ypills');
  const byYear={};
  months.forEach(m=>{const yr=m.split(' ')[1];if(!byYear[yr])byYear[yr]=[];byYear[yr].push(m);});
  let html='';
  Object.keys(byYear).sort().forEach(yr=>{
    html+=`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.6px;margin-bottom:4px;text-transform:uppercase">${yr}</div><div style="display:flex;gap:4px;flex-wrap:wrap">`;
    byYear[yr].forEach(m=>{
      const mon=m.split(' ')[0];
      let cls='yp';
      if(yCmp[0]===m) cls+=' cmpa';
      else if(yCmp[1]===m) cls+=' cmpb';
      else if(yCmp.length===0&&yFM===m) cls+=' single';
      html+=`<button class="${cls}" data-m="${esc(m)}">${esc(mon)}</button>`;
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
  el.querySelectorAll('.yp').forEach(b=>b.addEventListener('click',()=>{
    const m=b.dataset.m;
    if(yCmp.includes(m)){yCmp=yCmp.filter(x=>x!==m);if(yCmp.length===0)yFM='all';}
    else if(yCmp.length===2){yCmp=[yCmp[1],m];}
    else if(yCmp.length===1){yCmp=[...yCmp,m];}
    else if(yFM===m){yFM='all';}
    else if(yFM!=='all'){yCmp=[yFM,m];yFM='all';}
    else{yFM=m;}
    rYearly();
  }));
  const isC=yCmp.length===2;
  document.getElementById('ycbar').style.display=isC?'flex':'none';
  if(isC) document.getElementById('yclbl').textContent='Comparing '+yCmp[0]+' vs '+yCmp[1];
  const hint=document.getElementById('yhint');
  if(hint){
    if(isC) hint.textContent='Compare mode &#8212; click coloured pill to deselect';
    else if(yFM!=='all') hint.textContent='Single month &#8212; click another to compare';
    else hint.textContent='Click a month to filter · Click 2 to compare';
  }
}

// ── DAILY TRACKER ─────────────────────────────────────────────────────────────
// DDATA fields: 0:date  1:day  2:show_id  3:show_title
//               4:scripts_sub  5:er_approved  6:eps_live  7:script_wc  8:live_dur_hr;

let dFiltFrom='', dFiltTo='', dSort='date_desc';

function dMonths(){
  const months={};
  DDATA.forEach(r=>{
    const dt=new Date(r[DF.date]);
    const key=dt.toLocaleString('en-US',{month:'short'})+' '+dt.getFullYear();
    const sort=r[DF.date].slice(0,7);
    if(!months[sort]) months[sort]={label:key,sort};
  });
  return Object.values(months).sort((a,b)=>b.sort.localeCompare(a.sort));
}

function dFiltered(){
  const q=(document.getElementById('dsearch')||{value:''}).value.toLowerCase().trim();
  let list=DDATA.filter(r=>{
    const selYear=(document.getElementById('d-year')||{value:''}).value;
    const selMonth=(document.getElementById('d-month')||{value:''}).value;
    if(selYear&&!r[DF.date].startsWith(selYear)) return false;
    if(selMonth&&!r[DF.date].startsWith(selMonth)) return false;
    if(dFiltFrom&&r[DF.date]<dFiltFrom) return false;
    if(dFiltTo&&r[DF.date]>dFiltTo) return false;
    if(q&&!r[DF.show].toLowerCase().includes(q)&&!r[DF.id].toLowerCase().includes(q)) return false;
    if(!r[DF.sub]&&!r[DF.er]&&!r[DF.live]&&!r[DF.wc]&&!r[DF.dur]) return false;
    return true;
  });
  const [col,dir]=dSort.split('_');
  const asc=dir==='asc';
  list.sort((a,b)=>{
    if(col==='date') return asc?a[DF.date].localeCompare(b[DF.date]):b[DF.date].localeCompare(a[DF.date]);
    if(col==='show') return asc?a[DF.show].localeCompare(b[DF.show]):b[DF.show].localeCompare(a[DF.show]);
    const fi={sub:DF.sub,er:DF.er,live:DF.live,wc:DF.wc,dur:DF.dur}[col];
    return asc?a[fi]-b[fi]:b[fi]-a[fi];
  });
  return list;
}
function setDSort(col){
  const [c,d]=dSort.split('_');
  dSort=(c===col&&d==='desc')?col+'_asc':col+'_desc';
  rDaily();
}

function rDYearMonth(){
  // Build year options from DDATA
  const years=[...new Set(DDATA.map(r=>r[DF.date].slice(0,4)))].sort().reverse();
  const yearEl=document.getElementById('d-year');
  const curYear=yearEl.value;
  yearEl.innerHTML='<option value="">All years</option>'+
    years.map(y=>`<option value="${y}"${curYear===y?' selected':''}>${y}</option>`).join('');

  // Build month options based on selected year
  const selYear=yearEl.value;
  const monthMap={};
  DDATA.forEach(r=>{
    const yr=r[DF.date].slice(0,4);
    const mo=r[DF.date].slice(0,7); // YYYY-MM
    if(!selYear||yr===selYear) monthMap[mo]=true;
  });
  const months=Object.keys(monthMap).sort().reverse();
  const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthEl=document.getElementById('d-month');
  const curMonth=monthEl.value;
  monthEl.innerHTML='<option value="">All months</option>'+
    months.map(m=>{
      const lbl=monthNames[parseInt(m.slice(5,7))-1]+' '+m.slice(0,4);
      return`<option value="${m}"${curMonth===m?' selected':''}>${lbl}</option>`;
    }).join('');
}
function onDYearChange(){
  // Reset month when year changes
  document.getElementById('d-month').value='';
  rDYearMonth();
  rDaily();
}
